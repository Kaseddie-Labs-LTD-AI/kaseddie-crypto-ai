<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaseddie AI - Intelligent Crypto Trading on Starknet</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Starknet.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/starknet@5.24.3/dist/index.min.js"></script>

    <style>
        /* --- FINE-TUNED CSS FOR A PROFESSIONAL INVESTOR DEMO --- */

        :root {
            --primary-color: #00d4ff;
            --secondary-color: #ff6b35;
            --accent-color: #00ff88;
            --dark-bg: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --text-muted: #888888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* --- Header & Navigation --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(15px);
            z-index: 1000;
            border-bottom: 1px solid var(--card-border);
            transition: background 0.3s ease;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--primary-color);
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
            position: relative;
            padding: 5px 0;
        }

            .nav-link:hover, .nav-link.active {
                color: var(--primary-color);
            }

            .nav-link::after {
                content: '';
                position: absolute;
                bottom: 0;
                left: 0;
                width: 0;
                height: 2px;
                background: var(--primary-color);
                transition: width 0.3s ease;
            }

            .nav-link:hover::after, .nav-link.active::after {
                width: 100%;
            }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .connect-wallet-btn {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.2);
        }

            .connect-wallet-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
            }

        #wallet-info {
            display: none;
            align-items: center;
            gap: 10px;
            background: var(--card-bg);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid var(--card-border);
        }

        #wallet-address {
            font-weight: 600;
            font-size: 0.9rem;
        }

        #disconnect-btn {
            background: none;
            border: none;
            color: var(--secondary-color);
            cursor: pointer;
            font-size: 1rem;
        }

        /* --- Hero Section --- */
        #home {
            padding-top: 150px;
            padding-bottom: 80px;
            text-align: center;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

            #home::before {
                content: '';
                position: absolute;
                top: -20%;
                left: -20%;
                width: 40%;
                height: 80%;
                background: radial-gradient(circle, rgba(0, 212, 255, 0.1), transparent 70%);
                filter: blur(100px);
                z-index: -1;
            }

            #home::after {
                content: '';
                position: absolute;
                bottom: -20%;
                right: -20%;
                width: 40%;
                height: 80%;
                background: radial-gradient(circle, rgba(255, 107, 53, 0.1), transparent 70%);
                filter: blur(100px);
                z-index: -1;
            }

        h1 {
            font-size: 3.8rem;
            font-weight: 900;
            margin-bottom: 20px;
            line-height: 1.2;
            background: linear-gradient(135deg, var(--primary-color) 0%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            max-width: 700px;
            margin: 0 auto 40px;
            color: var(--text-secondary);
        }

        .starknet-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--primary-color);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            margin-top: 20px;
        }

            .starknet-badge img {
                width: 20px;
                height: 20px;
            }

        /* --- General & Animation Styles --- */
        section {
            padding: 100px 0;
        }

        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }

            .fade-in.is-visible {
                opacity: 1;
                transform: translateY(0);
            }

        /* --- Live Chat Widget --- */
        #liveChatWidget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2000;
        }

        .chat-button {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.4);
            transition: all 0.3s ease;
            position: relative;
        }

            .chat-button:hover {
                transform: scale(1.1);
            }

            .chat-button i {
                color: white;
                font-size: 24px;
            }

        .chat-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--secondary-color);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .chat-window {
            display: none;
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 350px;
            height: 450px;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 15px;
            overflow: hidden;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

            .chat-window.active {
                display: flex;
            }

        .chat-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

            .chat-header h4 {
                color: white;
                margin: 0;
                display: flex;
                align-items: center;
                gap: 8px;
                font-weight: 600;
            }

            .chat-header button {
                background: none;
                border: none;
                color: white;
                font-size: 20px;
                cursor: pointer;
            }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            display: flex;
            flex-direction: column;
        }

        .bot-message {
            align-self: flex-start;
        }

        .user-message {
            align-self: flex-end;
        }

        .message-content {
            padding: 10px 15px;
            border-radius: 15px;
            color: var(--text-primary);
            line-height: 1.5;
        }

        .bot-message .message-content {
            background: var(--card-bg);
            border-top-left-radius: 0;
        }

        .user-message .message-content {
            background: var(--primary-color);
            color: var(--dark-bg);
            font-weight: 500;
            border-top-right-radius: 0;
        }

        .message-time {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .bot-message .message-time {
            text-align: left;
            margin-left: 5px;
        }

        .user-message .message-time {
            text-align: right;
            margin-right: 5px;
        }

        .chat-input {
            padding: 15px;
            border-top: 1px solid var(--card-border);
            display: flex;
            gap: 10px;
        }

            .chat-input input {
                flex: 1;
                padding: 10px 15px;
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid var(--card-border);
                border-radius: 20px;
                color: white;
                outline: none;
                transition: border-color 0.3s;
            }

                .chat-input input:focus {
                    border-color: var(--primary-color);
                }

            .chat-input button {
                width: 40px;
                height: 40px;
                background: var(--primary-color);
                border: none;
                border-radius: 50%;
                color: white;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
            }

        /* Notification Styles */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: black;
            font-weight: 600;
            z-index: 3000;
            animation: slideUp 0.5s ease-out forwards;
            max-width: 320px;
            word-wrap: break-word;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

            .notification.success {
                background-color: var(--accent-color);
            }

            .notification.error {
                background-color: var(--secondary-color);
                color: white;
            }

            .notification.info {
                background-color: var(--primary-color);
            }

        @keyframes slideUp {
            from {
                transform: translateY(100px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes slideDown {
            from {
                transform: translateY(0);
                opacity: 1;
            }

            to {
                transform: translateY(100px);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            h1 {
                font-size: 2.8rem;
            }

            .hero-subtitle {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <nav class="container">
            <div class="logo">Kaseddie AI</div>
            <div class="nav-links">
                <a href="#home" class="nav-link active">Home</a>
                <!-- Add other nav links as you build sections -->
            </div>
            <div class="header-actions">
                <div id="wallet-info">
                    <span id="wallet-address"></span>
                    <button id="disconnect-btn" title="Disconnect Wallet"><i class="fas fa-sign-out-alt"></i></button>
                </div>
                <button id="connect-wallet-btn" class="connect-wallet-btn">
                    <i class="fas fa-wallet"></i> Connect Wallet
                </button>
            </div>
        </nav>
    </header>

    <main>
        <section id="home">
            <div class="container">
                <h1>AI-Powered Trading on Starknet</h1>
                <p class="hero-subtitle">
                    Leverage institutional-grade AI strategies and seamless voice commands to navigate the crypto markets. Built for performance and security on the Starknet L2 network.
                </p>
                <div class="starknet-badge">
                    <img src="https://starkware.co/wp-content/uploads/2021/07/starknet-logo.png" alt="Starknet Logo">
                    <span>Powered by Starknet</span>
                </div>
            </div>
        </section>

        <!-- All other sections of your website would be added here -->

    </main>

    <!-- The Live Chat Widget will be created and appended by JavaScript -->

    <script>
        class KaseddiePlatform {
            constructor() {
                // Wallet state
                this.wallet = null;
                this.starknet = window.starknet;

                // DOM Elements
                this.connectBtn = document.getElementById('connect-wallet-btn');
                this.disconnectBtn = document.getElementById('disconnect-btn');
                this.walletInfoDiv = document.getElementById('wallet-info');
                this.walletAddressSpan = document.getElementById('wallet-address');

                // API Base - Point to your LIVE backend on Railway
                this.apiBase = 'https://kaseddie-crypto-production.up.railway.app/api';

                this.init();
            }

            init() {
                this.setupWalletConnection();
                this.setupNavigation();
                this.setupAnimations();
                this.setupVoiceWelcome();
                this.setupLiveChat();
            }

            // --- STARKNET WALLET METHODS ---
            setupWalletConnection() {
                if (!this.starknet) {
                    this.showNotification("Starknet wallet not found. Please install ArgentX or Braavos.", "error");
                    this.connectBtn.disabled = true;
                    this.connectBtn.textContent = "Wallet Not Found";
                    return;
                }
                this.connectBtn.addEventListener('click', () => this.connectWallet());
                this.disconnectBtn.addEventListener('click', () => this.disconnectWallet());
                this.starknet.isPreauthorized().then(isConnected => {
                    if (isConnected) this.connectWallet(true);
                });
                this.starknet.on('accountsChanged', (accounts) => {
                    if (accounts.length > 0) this.handleConnection(this.starknet);
                    else this.disconnectWallet();
                });
            }

            async connectWallet(silent = false) {
                try {
                    const wallet = await this.starknet.enable({ showList: !silent });
                    if (wallet && wallet.isConnected) this.handleConnection(wallet);
                } catch (error) {
                    this.showNotification("Wallet connection was rejected.", "error");
                }
            }

            handleConnection(wallet) {
                this.wallet = wallet;
                const address = this.wallet.selectedAddress;
                const truncatedAddress = `${address.substring(0, 6)}...${address.substring(address.length - 4)}`;
                this.walletAddressSpan.textContent = truncatedAddress;
                this.walletAddressSpan.title = address;
                this.connectBtn.style.display = 'none';
                this.walletInfoDiv.style.display = 'flex';
                this.showNotification(`Wallet connected: ${truncatedAddress}`, 'success');
            }

            disconnectWallet() {
                this.wallet = null;
                this.connectBtn.style.display = 'block';
                this.walletInfoDiv.style.display = 'none';
                this.walletAddressSpan.textContent = '';
                this.showNotification("Wallet disconnected.", "info");
            }

            // --- CORE PLATFORM METHODS ---
            setupVoiceWelcome() {
                if ('speechSynthesis' in window) {
                    this.speechSynthesis = window.speechSynthesis;
                    setTimeout(() => this.playWelcomeMessage(), 3000);
                }
            }

            playWelcomeMessage() {
                const welcomeText = `Welcome to Kaseddie AI. Wallet connectivity is now active. You can ask me about crypto prices, trading strategies, or connect your Starknet wallet to begin.`;
                this.speak(welcomeText);
                this.showNotification('🎤 AI Assistant: Welcome!', 'info');
            }

            speak(text) {
                if (this.speechSynthesis) {
                    this.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.rate = 0.95;
                    utterance.pitch = 1.0;
                    utterance.volume = 0.8;
                    const voices = this.speechSynthesis.getVoices();
                    const femaleVoice = voices.find(v => v.name.includes('Female') || v.name.includes('Samantha') || v.lang.startsWith('en'));
                    if (femaleVoice) utterance.voice = femaleVoice;
                    this.speechSynthesis.speak(utterance);
                }
            }

            setupLiveChat() {
                const chatWidget = document.createElement('div');
                chatWidget.id = 'liveChatWidget';
                chatWidget.innerHTML = `
                        <div class="chat-button" onclick="platform.toggleLiveChat()">
                            <i class="fas fa-comments"></i>
                            <span class="chat-badge">1</span>
                        </div>
                        <div class="chat-window" id="chatWindow">
                            <div class="chat-header">
                                <h4><i class="fas fa-robot"></i> AI Support</h4>
                                <button onclick="platform.closeLiveChat()">&times;</button>
                            </div>
                            <div class="chat-messages" id="chatMessages">
                                <div class="message bot-message">
                                    <div class="message-content">👋 Hi! I'm the Kaseddie AI assistant. Ask me anything about crypto prices, trading strategies, or how to use the platform.</div>
                                    <div class="message-time">Just now</div>
                                </div>
                            </div>
                            <div class="chat-input">
                                <input type="text" id="chatInput" placeholder="Ask about 'price of bitcoin'..." onkeypress="if(event.key === 'Enter') platform.sendChatMessage()">
                                <button onclick="platform.sendChatMessage()"><i class="fas fa-paper-plane"></i></button>
                            </div>
                        </div>
                    `;
                document.body.appendChild(chatWidget);
            }

            toggleLiveChat() {
                document.getElementById('chatWindow').classList.toggle('active');
                const badge = document.querySelector('.chat-badge');
                if (badge) badge.style.display = 'none';
            }

            closeLiveChat() {
                document.getElementById('chatWindow').classList.remove('active');
            }

            sendChatMessage() {
                const input = document.getElementById('chatInput');
                const message = input.value.trim();
                if (!message) return;

                this.addChatMessage(message, 'user');
                input.value = '';

                setTimeout(() => {
                    const response = this.generateAIResponse(message);
                    this.addChatMessage(response, 'bot');
                    this.speak(response);
                }, 1000);
            }

            addChatMessage(message, sender) {
                const messagesContainer = document.getElementById('chatMessages');
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${sender}-message`;
                const timeString = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                messageDiv.innerHTML = `
                        <div class="message-content">${message.replace(/\n/g, '<br>')}</div>
                        <div class="message-time">${timeString}</div>
                    `;

                messagesContainer.appendChild(messageDiv);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }

            // --- UPGRADED "SMART DEMO" AI LOGIC ---
            generateAIResponse(userMessage) {
                const message = userMessage.toLowerCase();
                const cryptoKnowledge = {
                    'bitcoin': { symbol: 'BTC', price: 68123.45, change: 2.1, marketCap: '1.3T', info: 'The original cryptocurrency, often seen as digital gold and a store of value.' },
                    'ethereum': { symbol: 'ETH', price: 3567.89, change: -1.2, marketCap: '428B', info: 'The leading smart contract platform, powering DeFi, NFTs, and thousands of dApps.' },
                    'starknet': { symbol: 'STRK', price: 1.25, change: 5.5, marketCap: '1.2B', info: 'A leading ZK-Rollup (L2) that scales Ethereum by bundling transactions for massive throughput and low fees. It is ideal for complex applications like ours.' },
                    'solana': { symbol: 'SOL', price: 150.11, change: 4.8, marketCap: '68B', info: 'A high-speed blockchain known for its fast transaction times and low costs, popular for DeFi and NFTs.' },
                };
                const intents = [
                    {
                        regex: /price of (\w+)|what is the price of (\w+)|(\w+) price/,
                        handler: (matches) => {
                            const cryptoName = matches[1] || matches[2] || matches[3];
                            if (cryptoKnowledge[cryptoName]) {
                                const data = cryptoKnowledge[cryptoName];
                                const changeSign = data.change >= 0 ? '+' : '';
                                return `The current price of ${cryptoName.charAt(0).toUpperCase() + cryptoName.slice(1)} (${data.symbol}) is **$${data.price.toLocaleString()}** (${changeSign}${data.change}% 24h). Its market cap is ${data.marketCap}. Would you like to analyze it further?`;
                            }
                            return `I don't have specific data for ${cryptoName} in my demo knowledge base, but I can provide info on Bitcoin, Ethereum, or Starknet.`;
                        }
                    },
                    {
                        regex: /tell me about (momentum|arbitrage|scalping|sentiment) strategy/,
                        handler: (matches) => {
                            const strategy = matches[1];
                            const details = {
                                momentum: 'Momentum trading involves buying assets that are showing a strong upward trend. Our AI identifies these trends early with an 82% back-tested accuracy.',
                                arbitrage: 'Arbitrage exploits price differences for the same asset across different exchanges. Our AI scans dozens of pairs in real-time. This is a lower-risk, high-frequency strategy.',
                                scalping: 'Scalping aims to make small profits from many quick trades. This is best suited for automated bots on low-fee networks like Starknet.',
                                sentiment: 'Sentiment analysis involves scanning social media, news, and forums to gauge market mood. Our AI processes millions of data points to detect shifts before they impact price.'
                            };
                            return `🤖 The **${strategy.charAt(0).toUpperCase() + strategy.slice(1)} Strategy** is one of our core offerings. ${details[strategy]} Would you like to simulate it?`;
                        }
                    },
                    { regex: /strateg(y|ies)/, handler: () => 'We offer 10 advanced AI strategies, including Momentum, Arbitrage, Sentiment Analysis, and AI-based Forecasting. Which one are you interested in learning more about?' },
                    { regex: /price|prices|market/, handler: () => 'I can provide live prices for major cryptocurrencies. For example, you can ask, "What is the price of Ethereum?"' },
                    { regex: /hello|hi|help|support/, handler: () => 'Hello! I am the Kaseddie AI assistant. I can help with:\n- Crypto prices (e.g., "price of bitcoin")\n- Trading strategies (e.g., "tell me about arbitrage")\n- Platform features.\nHow can I assist you?' }
                ];
                for (const intent of intents) {
                    const match = message.match(intent.regex);
                    if (match) return intent.handler(match);
                }
                return `I'm sorry, I'm not sure how to answer that yet. My capabilities in this demo are focused on crypto prices and trading strategies. \n\nYou could try asking:\n- "What is the price of Starknet?"\n- "Tell me about the momentum strategy."`;
            }

            // --- Other Methods ---
            setupNavigation() {
                document.querySelectorAll('.nav-link').forEach(link => {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        const targetId = link.getAttribute('href');
                        if (document.querySelector(targetId)) {
                            document.querySelector(targetId).scrollIntoView({ behavior: 'smooth' });
                        }
                    });
                });
            }
            setupAnimations() {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('is-visible');
                        }
                    });
                }, { threshold: 0.1 });

                document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
            }
            showNotification(message, type = 'info') {
                const notification = document.createElement('div');
                notification.className = `notification ${type}`;
                notification.textContent = message;
                document.body.appendChild(notification);
                setTimeout(() => {
                    notification.style.animation = 'slideDown 0.5s ease-in forwards';
                    setTimeout(() => notification.remove(), 500);
                }, 5000);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            window.platform = new KaseddiePlatform();
        });
    </script>
</body>
</html>
